<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coming Soon - RideOn | Something Exciting is Brewing</title>
  <meta name="description" content="We're building something exciting! Sign up to be the first to know when RideOn's new features launch." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:{DEFAULT:'#f97316',light:'#fb923c',dark:'#ea580c'},secondary:{DEFAULT:'#0f172a',light:'#1e293b',lighter:'#334155'},accent:{DEFAULT:'#10b981',light:'#34d399',dark:'#059669'},surface:{DEFAULT:'#ffffff',dark:'#151929',darker:'#0c0f1a'}},fontFamily:{heading:['Outfit','sans-serif'],body:['Inter','sans-serif']}}}};</script>
  <link rel="stylesheet" href="assets/css/style.css" /><link rel="stylesheet" href="assets/css/dark-mode.css" /><link rel="stylesheet" href="assets/css/rtl.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body class="font-body min-h-screen flex flex-col relative overflow-hidden" style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);">
  <!-- Decorative backgrounds -->
  <div class="absolute inset-0 overflow-hidden">
    <div class="absolute top-20 left-10 w-72 h-72 bg-primary/8 rounded-full blur-3xl"></div>
    <div class="absolute bottom-20 right-10 w-96 h-96 bg-accent/5 rounded-full blur-3xl"></div>
    <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/3 rounded-full blur-3xl"></div>
  </div>
  <div class="absolute inset-0 opacity-[0.02]" style="background-image: radial-gradient(circle, #fff 1px, transparent 1px); background-size: 40px 40px;"></div>

  <!-- Nav -->
  <div class="relative z-10 p-6 flex items-center justify-between">
    <a href="index.html" class="navbar__logo inline-flex" style="color:white;"><div class="navbar__logo-icon"><i data-lucide="bike" class="w-5 h-5"></i></div><span>Ride<span class="text-primary">On</span></span></a>
    <button class="btn btn--icon btn--ghost text-white" data-theme-toggle aria-label="Toggle dark mode"><i data-lucide="sun" class="w-5 h-5 icon-sun" style="display:none;"></i><i data-lucide="moon" class="w-5 h-5 icon-moon"></i></button>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex items-center justify-center px-6 relative z-10">
    <div class="text-center max-w-2xl animate-on-scroll">
      <div class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full bg-white/5 backdrop-blur-md border border-white/10 mb-8">
        <i data-lucide="rocket" class="w-4 h-4 text-primary"></i>
        <span class="text-white/80 font-semibold text-sm tracking-wider">LAUNCHING SOON</span>
      </div>

      <h1 class="font-heading text-4xl md:text-5xl lg:text-6xl font-900 text-white leading-[1.1] mb-6">
        Something <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-primary-light">Exciting</span> is Coming
      </h1>
      <p class="text-slate-400 text-lg md:text-xl max-w-lg mx-auto mb-10 leading-relaxed">We're working hard to bring you an amazing new experience. Be the first to know when we launch.</p>

      <!-- Countdown Timer -->
      <div class="grid grid-cols-4 gap-4 max-w-md mx-auto mb-12">
        <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-4">
          <div class="font-heading text-3xl md:text-4xl font-900 text-white" id="countDays">30</div>
          <div class="text-xs text-slate-500 mt-1 uppercase tracking-wider">Days</div>
        </div>
        <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-4">
          <div class="font-heading text-3xl md:text-4xl font-900 text-white" id="countHours">12</div>
          <div class="text-xs text-slate-500 mt-1 uppercase tracking-wider">Hours</div>
        </div>
        <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-4">
          <div class="font-heading text-3xl md:text-4xl font-900 text-white" id="countMinutes">45</div>
          <div class="text-xs text-slate-500 mt-1 uppercase tracking-wider">Minutes</div>
        </div>
        <div class="bg-white/5 backdrop-blur-md border border-white/10 rounded-2xl p-4">
          <div class="font-heading text-3xl md:text-4xl font-900 text-primary" id="countSeconds">00</div>
          <div class="text-xs text-slate-500 mt-1 uppercase tracking-wider">Seconds</div>
        </div>
      </div>

      <!-- Notify Form -->
      <form class="flex flex-col sm:flex-row gap-3 max-w-md mx-auto mb-8" onsubmit="event.preventDefault(); showToast('You\'ll be notified at launch! 🚀', 'success'); this.reset();">
        <div class="relative flex-1">
          <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
          <input type="email" placeholder="Enter your email" class="w-full py-3 pl-10 pr-4 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 text-sm focus:border-primary focus:outline-none transition-colors" required />
        </div>
        <button type="submit" class="btn btn--primary btn--lg">
          Notify Me
          <i data-lucide="bell" class="w-4 h-4"></i>
        </button>
      </form>

      <!-- Social -->
      <p class="text-sm text-slate-500 mb-4">Follow us for updates</p>
      <div class="flex justify-center gap-3">
        <a href="#" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-slate-400 hover:bg-primary hover:text-white hover:border-primary transition-all"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg></a>
        <a href="#" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-slate-400 hover:bg-primary hover:text-white hover:border-primary transition-all"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 4s-.7 2.1-2 3.4c1.6 10-9.4 17.3-18 11.6 2.2.1 4.4-.6 6-2C3 15.5.5 9.6 3 5c2.2 2.6 5.6 4.1 9 4-.9-4.2 4-6.6 7-3.8 1.1 0 3-1.2 3-1.2z"/></svg></a>
        <a href="#" class="w-10 h-10 rounded-xl bg-white/5 border border-white/10 flex items-center justify-center text-slate-400 hover:bg-primary hover:text-white hover:border-primary transition-all"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg></a>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="relative z-10 p-6 text-center">
    <p class="text-xs text-slate-600">&copy; 2026 RideOn. All rights reserved. <a href="index.html" class="text-primary hover:underline">Back to Home</a></p>
  </div>

  <div class="toast-container"></div>
  <script src="assets/js/main.js"></script>
  <script>
    lucide.createIcons();
    /* Countdown Timer */
    var launchDate = new Date();
    launchDate.setDate(launchDate.getDate() + 30);
    function updateCountdown() {
      var now = new Date().getTime();
      var diff = launchDate.getTime() - now;
      if (diff <= 0) { document.getElementById('countDays').textContent = '00'; document.getElementById('countHours').textContent = '00'; document.getElementById('countMinutes').textContent = '00'; document.getElementById('countSeconds').textContent = '00'; return; }
      var d = Math.floor(diff / (1000 * 60 * 60 * 24));
      var h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      var m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      var s = Math.floor((diff % (1000 * 60)) / 1000);
      document.getElementById('countDays').textContent = d < 10 ? '0' + d : d;
      document.getElementById('countHours').textContent = h < 10 ? '0' + h : h;
      document.getElementById('countMinutes').textContent = m < 10 ? '0' + m : m;
      document.getElementById('countSeconds').textContent = s < 10 ? '0' + s : s;
    }
    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
