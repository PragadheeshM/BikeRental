<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account - RideOn</title>
  <meta name="description" content="Create your free RideOn account to start booking premium bike rentals and guided tours. Join 12,000+ riders worldwide." />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{colors:{primary:{DEFAULT:'#f97316',light:'#fb923c',dark:'#ea580c'},secondary:{DEFAULT:'#0f172a',light:'#1e293b',lighter:'#334155'},accent:{DEFAULT:'#10b981',light:'#34d399',dark:'#059669'},surface:{DEFAULT:'#ffffff',dark:'#151929',darker:'#0c0f1a'}},fontFamily:{heading:['Outfit','sans-serif'],body:['Inter','sans-serif']}}}};</script>
  <link rel="stylesheet" href="assets/css/style.css" /><link rel="stylesheet" href="assets/css/dark-mode.css" /><link rel="stylesheet" href="assets/css/rtl.css" />
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
</head>
<body class="font-body min-h-screen flex">
  <!-- Left: Image -->
  <div class="hidden lg:flex lg:w-1/2 relative overflow-hidden">
    <img src="https://images.unsplash.com/photo-1558981420-c532902e58b4?w=1000&h=1200&fit=crop" alt="Adventure motorcycle" class="w-full h-full object-cover" />
    <div class="absolute inset-0 bg-gradient-to-t from-black/70 via-black/30 to-transparent"></div>
    <div class="absolute bottom-12 left-12 right-12 z-10">
      <a href="index.html" class="navbar__logo mb-6 inline-flex" style="color:white;"><div class="navbar__logo-icon"><i data-lucide="bike" class="w-5 h-5"></i></div><span>Ride<span class="text-primary">On</span></span></a>
      <h2 class="font-heading text-3xl font-800 text-white leading-tight mb-3">Start Your Adventure</h2>
      <p class="text-white/70 text-sm leading-relaxed">Join 12,000+ riders who explore the world on two wheels with RideOn. Create your free account in seconds.</p>
    </div>
  </div>

  <!-- Right: Form -->
  <div class="flex-1 flex items-center justify-center p-6 md:p-12 bg-white dark:bg-surface-darker overflow-y-auto">
    <div class="w-full max-w-md">
      <!-- Card Header -->
      <div class="flex items-center justify-between mb-8">
        <a href="index.html" class="navbar__logo inline-flex">
          <div class="navbar__logo-icon"><i data-lucide="bike" class="w-5 h-5"></i></div>
          <span>Ride<span class="text-primary">On</span></span>
        </a>
        <div class="flex items-center gap-1">
          <button class="btn btn--icon btn--ghost" data-rtl-toggle aria-label="Toggle RTL"><i data-lucide="globe" class="w-5 h-5"></i></button>
          <button class="btn btn--icon btn--ghost" data-theme-toggle aria-label="Toggle dark mode"><i data-lucide="sun" class="w-5 h-5 icon-sun" style="display:none;"></i><i data-lucide="moon" class="w-5 h-5 icon-moon"></i></button>
        </div>
      </div>

      <h1 class="font-heading text-3xl font-800 mb-2" style="color: var(--text-heading);">Create Account</h1>
      <p class="text-slate-500 text-sm mb-8">Fill in your details to get started.</p>

      <div class="grid grid-cols-2 gap-3 mb-6">
        <button class="btn btn--ghost text-sm" onclick="showToast('Google signup coming soon!', 'info')"><svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Google</button>
        <button class="btn btn--ghost text-sm" onclick="showToast('Facebook signup coming soon!', 'info')"><svg class="w-5 h-5" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg> Facebook</button>
      </div>
      <div class="flex items-center gap-3 mb-6"><div class="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div><span class="text-xs text-slate-400 font-500">OR</span><div class="flex-1 h-px bg-slate-200 dark:bg-slate-700"></div></div>

      <form data-validate id="registerForm">
        <div class="grid grid-cols-2 gap-4">
          <div class="form-group"><label class="form-label" for="regFirst">First Name</label><input type="text" id="regFirst" class="form-input" placeholder="Enter first name" required /><p class="form-error"></p></div>
          <div class="form-group"><label class="form-label" for="regLast">Last Name</label><input type="text" id="regLast" class="form-input" placeholder="Enter last name" required /><p class="form-error"></p></div>
        </div>
        <div class="form-group"><label class="form-label" for="regEmail">Email Address</label><div class="relative"><i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i><input type="email" id="regEmail" class="form-input pl-10" placeholder="Enter your email" required /></div><p class="form-error"></p></div>
        <div class="form-group"><label class="form-label" for="regPhone">Phone Number</label><div class="relative"><i data-lucide="phone" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i><input type="tel" id="regPhone" class="form-input pl-10" placeholder="Enter phone number" /></div></div>
        <div class="form-group"><label class="form-label" for="regPassword">Password</label><div class="relative"><i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i><input type="password" id="regPassword" class="form-input pl-10" placeholder="Enter your password" required data-minlength="8" /><button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600" onclick="var i=this.previousElementSibling;i.type=i.type==='password'?'text':'password'"><i data-lucide="eye" class="w-4 h-4"></i></button></div><p class="form-error">Must be at least 8 characters</p></div>
        <div class="flex items-start gap-2 mb-6">
          <input type="checkbox" id="agreeTerms" class="w-4 h-4 mt-0.5 rounded border-slate-300 text-primary accent-primary" required />
          <label for="agreeTerms" class="text-sm text-slate-500">I agree to the Terms of Service and Privacy Policy</label>
        </div>
        <button type="submit" class="btn btn--primary w-full btn--lg mb-4">Create Account <i data-lucide="arrow-right" class="w-5 h-5"></i></button>
      </form>
      <p class="text-center text-sm text-slate-500">Already have an account? <a href="login.html" class="text-primary font-600 hover:underline">Sign in</a></p>
    </div>
  </div>

  <div class="toast-container"></div>
  <script src="assets/js/main.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
